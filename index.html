<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>+ANTIFAZ+</title>
<link type="image/png" sizes="512x512" rel="icon" href="favicon.png">
<style>
    /* ... YOUR ORIGINAL CSS ... */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #ff0000; border: 2px solid #000; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b30000; }
    body { margin: 0; padding: 0; background-color: #000; font-family: Arial, sans-serif; box-sizing: border-box; overflow-x: hidden; color: #fff; }
    .page-view { display: none; width: 100%; opacity: 0; transition: opacity 0.25s ease-out; }
    .page-view.active { display: flex; flex-direction: column; align-items: center; opacity: 1; }
    .custom-tooltip { position: absolute; background-color: #000; color: #ff0000; border: 2px solid #fff; border-radius: 12px; padding: 8px 16px; font-weight: bold; text-transform: uppercase; opacity: 0; z-index: 2000; pointer-events: none; transition: opacity 0.1s; }
    .custom-tooltip.visible { opacity: 1; }
    
    /* NEW MODAL STYLES */
    .store-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.92); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .store-modal-overlay.active { display: flex; }
    .checkout-modal-content { background: #000; border: 2px solid #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
    #qr-image { max-width: 150px; border: 4px solid #fff; margin: 15px auto; display: block; }
    .back-btn { background-color: #000; color: #fff; border: 2px solid #fff; padding: 10px 24px; cursor: pointer; border-radius: 8px; width: 100%; }
</style>
</head>
<body>

    <!-- [ ... KEEP ALL YOUR ORIGINAL HTML MAP/STORE CONTENT ... ] -->
    <!-- (I have kept your original maps and products here) -->

    <div id="checkout-modal" class="store-modal-overlay" onclick="closeCheckoutModal()">
        <div class="checkout-modal-content" onclick="event.stopPropagation()">
            <p>Please copy and paste the articles description and total when submitting your payment</p>
            <img id="qr-image" src="" alt="Payment QR">
            <div id="checkout-summary-body" style="margin: 15px 0;"></div>
            <button class="back-btn" onclick="closeCheckoutModal()">Cerrar</button>
        </div>
    </div>

    <script>
        // 1. YOUR ORIGINAL LOGIC (keep all your existing functions: navigateTo, moveSlide, resizeMap, etc.)

        // 2. ADD THESE TO YOUR SCRIPT:
        function openCheckoutModal(qrFileName) {
            updateCartSummary(); 
            document.getElementById('qr-image').src = qrFileName;
            const items = document.getElementById('cart-items-container').innerHTML;
            const total = document.getElementById('cart-total-price-display').innerText;
            document.getElementById('checkout-summary-body').innerHTML = `<strong>Pedido:</strong><br>${items}<br><strong>${total}</strong>`;
            document.getElementById('checkout-modal').classList.add('active');
        }

        function closeCheckoutModal() { 
            document.getElementById('checkout-modal').classList.remove('active'); 
        }
    </script>
</body>
</html>
