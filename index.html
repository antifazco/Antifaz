<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ANTIFAZ</title>
<link rel="icon" type="image/png" sizes="512x512" href="favicon.png">
<style>
    /* Sleek Custom Scrollbar */
    ::-webkit-scrollbar {
        width: 10px;
    }
    ::-webkit-scrollbar-track {
        background: #000;
    }
    ::-webkit-scrollbar-thumb {
        background: #ff0000;
        border: 2px solid #000;
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #b30000;
    }

    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        background-color: #000;
        font-family: Arial, sans-serif;
        padding-top: 20px;
        padding-bottom: 80px; 
        box-sizing: border-box;
        /* STRICT SAFENEG: Allows normal down scrolling, absolutely blocks side scrolling */
        overflow-x: hidden; 
    }

    .link-map-container {
        position: relative; 
        max-width: 1400px; 
        width: 95%; /* Perfect vertical-centric scaling on desktops */
        overflow: visible; 
    }

    .link-map-container img {
        display: block;
        width: 100%;
        height: auto;
    }

    area {
        cursor: pointer;
        /* Disables default mobile highlight box on tap */
        -webkit-tap-highlight-color: transparent;
    }

    /* MOBILE OPTIMIZATION: Max wide layout without any side-bleed */
    @media (max-width: 767px) {
        .link-map-container {
            width: 100% !important; /* Spans the maximum safe width of the phone frame */
            padding: 0;
        }
    }

    /* Frantic Punk Pop & Shake Animation */
    @keyframes punkPop {
        0% {
            opacity: 0;
            transform: translate(-50%, -122%) scale(0.4) rotate(-8deg);
        }
        50% {
            transform: translate(-50%, -122%) scale(1.1) rotate(4deg);
        }
        75% {
            transform: translate(-50%, -122%) scale(0.95) rotate(-2deg);
        }
        100% {
            opacity: 1;
            transform: translate(-50%, -122%) scale(1) rotate(0deg);
        }
    }

    /* Comic Book Speech Bubble Tooltip */
    .custom-tooltip {
        position: absolute;
        background-color: #000;      
        color: #ff0000;             
        border: 2px solid #fff;     
        border-radius: 12px;       
        padding: 8px 16px;
        font-size: 0.95rem; 
        font-weight: bold;
        letter-spacing: 1px;
        text-transform: uppercase;
        opacity: 0;
        transform: translate(-50%, -122%) scale(0.5);
        z-index: 2000;
        white-space: nowrap;
        box-shadow: 5px 5px 0px rgba(255, 0, 0, 0.3);
        
        /* MODIFIED: Enabled pointer events so the bubble can receive mobile click interactions */
        pointer-events: auto; 
        cursor: pointer;
        
        /* Dynamic transitional pacing for desktop cursor tracking paths */
        transition: background-color 0.1s, opacity 0.1s, left 0.05s ease-out, top 0.05s ease-out;
        -webkit-tap-highlight-color: transparent;
    }

    /* Tactile Mobile Tap Feedback for the speech bubble */
    .custom-tooltip:active {
        background-color: #111;
        box-shadow: 2px 2px 0px rgba(255, 0, 0, 0.5);
    }

    /* Speech Bubble Tail Outline */
    .custom-tooltip::before {
        content: "";
        position: absolute;
        bottom: -12px; 
        left: 50%;
        transform: translateX(-50%);
        border-width: 12px 10px 0; 
        border-style: solid;
        border-color: #fff transparent;
        display: block;
        width: 0;
    }

    /* Speech Bubble Tail Fill */
    .custom-tooltip::after {
        content: "";
        position: absolute;
        bottom: -9px; 
        left: 50%;
        transform: translateX(-50%);
        border-width: 10px 8px 0;
        border-style: solid;
        border-color: #000 transparent;
        display: block;
        width: 0;
    }

    .custom-tooltip.visible {
        opacity: 1;
        animation: punkPop 0.22s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
</style>
</head>
<body>

    <div class="link-map-container" id="container">
        <img src="web2026lore.jpg" alt="Antifaz Links" usemap="#antifaz-links" id="map-image">

        <map name="antifaz-links">
            <area shape="circle" coords="300,147,100" href="https://lamusicadelgarage.org/noticia/2416537/antifaz-y-el-grito-necesario-del-punk-latino-guillo-presenta-su-disco-debut-que-dolor" alt="Bio" data-tooltip="📖 Biografia ➔" target="_blank">

            <area shape="circle" coords="120,332,48" href="https://open.spotify.com/artist/6izznq82s4QurUpBqYthgt" alt="Spotify" data-tooltip="⚡ Spotify ➔" target="_blank">
            <area shape="circle" coords="242,332,48" href="https://www.instagram.com/antifaz.co" alt="Instagram" data-tooltip="📸 Instagram ➔" target="_blank">
            <area shape="circle" coords="364,332,48" href="https://www.youtube.com/@Antifaz-co" alt="YouTube" data-tooltip="📺 YouTube ➔" target="_blank">
            <area shape="circle" coords="486,332,48" href="https://antifazco.bandcamp.com" alt="Merch" data-tooltip="👕 Merch ➔" target="_blank">

            <area shape="circle" coords="133,510,58" href="https://www.instagram.com/santty_cast/" alt="Trombone" data-tooltip="🎺 Santiago (Trombón) ➔" target="_blank">
            <area shape="circle" coords="300,510,58" href="https://www.instagram.com/era_drummer/" alt="Drums" data-tooltip="🥁 Esteban (Batería) ➔" target="_blank">
            <area shape="circle" coords="467,510,58" href="https://www.instagram.com/gavoespitia/" alt="Trumpet" data-tooltip="🎺 Gabriel (Trompeta) ➔" target="_blank">

            <area shape="circle" coords="216,634,58" href="https://www.instagram.com/newbornlofi/" alt="Bass" data-tooltip="🎸 Boris (Bajo) ➔" target="_blank">
            <area shape="circle" coords="384,634,58" href="https://www.instagram.com/guillo.moji/" alt="Guitar" data-tooltip="🎤🎸 Guillo (Voz/Guitarra) ➔" target="_blank">

            <area shape="rect" coords="265,735,335,795" href="mailto:antifaz.co@gmail.com" alt="Info" data-tooltip="✉️ Email: ANTIFAZ.CO@GMAIL.COM ➔" target="_blank">

            <area shape="circle" coords="300,870,35" href="https://www.skacolombia.com/public/antifaz" alt="Contact" data-tooltip="ANTIFAZ RADIO ➔" target="_blank">
        </map>

        <div id="tooltip" class="custom-tooltip"></div>
    </div>

    <script>
        const tooltip = document.getElementById('tooltip');
        const container = document.getElementById('container');
        const areas = document.querySelectorAll('area');
        
        let activeArea = null; 
        let currentHoveredArea = null; // Guard flag to prevent redundant desktop refreshes

        areas.forEach(area => {
            // DESKTOP HOVER LOGIC
            area.addEventListener('mouseenter', (e) => {
                if (window.matchMedia("(pointer: coarse)").matches) return; 
                
                // Only reset the animation timeline if moving to a completely new area
                if (currentHoveredArea !== area) {
                    currentHoveredArea = area;
                    showTooltip(area);
                }
            });

            area.addEventListener('mousemove', (e) => {
                if (window.matchMedia("(pointer: coarse)").matches) return; 

                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                positionTooltip(x, y);
            });

            area.addEventListener('mouseleave', () => {
                if (window.matchMedia("(pointer: coarse)").matches) return; 
                currentHoveredArea = null;
                hideTooltip();
            });

            // SMART MOBILE CLICK / TOUCH INTERACTION
            area.addEventListener('click', (e) => {
                if (window.matchMedia("(pointer: coarse)").matches) {
                    if (activeArea !== area) {
                        e.preventDefault(); 
                        activeArea = area;
                        
                        showTooltip(area);
                        
                        const coords = area.coords.split(',').map(Number);
                        const shape = area.getAttribute('shape');
                        let centerX, centerY;

                        if (shape === 'circle') {
                            centerX = coords[0];
                            centerY = coords[1] - (coords[2] * 0.9); 
                        } else if (shape === 'rect') {
                            centerX = (coords[0] + coords[2]) / 2;
                            centerY = coords[1] + 10; 
                        }

                        positionTooltip(centerX, centerY);
                    }
                }
            });
        });

        // INTERACTIVE SPEECH BUBBLE TAP REGISTER
        tooltip.addEventListener('click', () => {
            if (window.matchMedia("(pointer: coarse)").matches && activeArea) {
                const destination = activeArea.getAttribute('href');
                const targetWindow = activeArea.getAttribute('target') || '_self';
                
                if (destination) {
                    window.open(destination, targetWindow);
                }
            }
        });

        document.body.addEventListener('click', (e) => {
            if (e.target.tagName !== 'AREA' && e.target !== tooltip) {
                activeArea = null;
                hideTooltip();
            }
        });

        function showTooltip(element) {
            tooltip.textContent = element.getAttribute('data-tooltip');
            tooltip.classList.remove('visible');
            void tooltip.offsetWidth; 
            tooltip.classList.add('visible');
        }

        function positionTooltip(x, y) {
            tooltip.style.left = `${x}px`;
            tooltip.style.top = `${y}px`;
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        function resizeMap() {
            const img = document.getElementById('map-image');
            const map = document.getElementsByName('antifaz-links')[0];
            const mapAreas = map.getElementsByTagName('area');
            
            const originalWidth = 600; 
            const currentWidth = img.clientWidth;
            
            if (currentWidth === 0) return;

            const scale = currentWidth / originalWidth;

            const originalCoords = [
                [300,147,100], 
                [120,332,48],  
                [242,332,48],  
                [364,332,48],  
                [486,332,48],  
                [133,510,58],  
                [300,510,58],  
                [467,510,58],  
                [216,634,58],  
                [384,634,58],  
                [265,735,335,795], 
                [300,870,35]   
            ];

            for (let i = 0; i < mapAreas.length; i++) {
                const shape = mapAreas[i].getAttribute('shape');
                let scaled = originalCoords[i].map(coord => Math.round(coord * scale));
                
                const verticalOffset = Math.round(15 * scale);
                
                if (shape === 'circle') {
                    scaled[1] = scaled[1] + verticalOffset;
                } else if (shape === 'rect') {
                    scaled[1] = scaled[1] + verticalOffset;
                    scaled[3] = scaled[3] + verticalOffset;
                }
                
                mapAreas[i].coords = scaled.join(',');
            }
            
            if (activeArea) {
                activeArea = null;
                hideTooltip();
            }
        }

        window.addEventListener('resize', resizeMap);
        document.getElementById('map-image').addEventListener('load', resizeMap);
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(resizeMap, 300);
        });
    </script>

</body>
</html>
