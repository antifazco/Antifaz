<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>+ANTIFAZ+</title>
<link type="image/png" sizes="512x512" rel="icon" href="favicon.png">
<style>
    /* Sleek Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #ff0000; border: 2px solid #000; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b30000; }

    body { margin: 0; padding: 0; background-color: #000; font-family: Arial, sans-serif; box-sizing: border-box; overflow-x: hidden; color: #fff; }

    .page-view { display: none; width: 100%; opacity: 0; transition: opacity 0.25s ease-out; }
    .page-view.active { display: flex; flex-direction: column; align-items: center; opacity: 1; }
    #home-page { padding-top: 20px; padding-bottom: 40px; }
    .link-map-container { position: relative; max-width: 1400px; width: 95%; overflow: visible; }
    .link-map-container img { display: block; width: 100%; height: auto; }
    area { cursor: pointer; -webkit-tap-highlight-color: transparent; }

    @keyframes punkPop {
        0% { opacity: 0; transform: translate(-50%, -122%) scale(0.4) rotate(-8deg); }
        50% { transform: translate(-50%, -122%) scale(1.1) rotate(4deg); }
        75% { transform: translate(-50%, -122%) scale(0.95) rotate(-2deg); }
        100% { opacity: 1; transform: translate(-50%, -122%) scale(1) rotate(0deg); }
    }

    .custom-tooltip { position: absolute; background-color: #000; color: #ff0000; border: 2px solid #fff; border-radius: 12px; padding: 8px 16px; font-size: 0.95rem; font-weight: bold; text-transform: uppercase; opacity: 0; transform: translate(-50%, -122%) scale(0.5); z-index: 2000; white-space: nowrap; pointer-events: none; transition: opacity 0.1s; }
    .custom-tooltip.visible { opacity: 1; animation: punkPop 0.22s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    .custom-tooltip::before { content: ""; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); border-width: 12px 10px 0; border-style: solid; border-color: #fff transparent; display: block; }

    #store-page { background-color: #000; width: 100%; display: flex; flex-direction: column; align-items: center; }
    .store-container, .store-footer-content { max-width: 950px; width: 62vw; min-width: 500px; box-sizing: border-box; }
    .products-grid { display: flex; flex-direction: column; gap: 35px; width: 100%; }
    .product-card { background-color: rgba(0, 0, 0, 0.88); border: 2px solid #fff; border-radius: 12px; padding: 12px 2.5%; display: flex; flex-direction: row; gap: 4%; }
    
    .store-select { width: 60px !important; background: #000; color: #fff; border: 2px solid #fff; padding: 6px; font-weight: bold; border-radius: 6px; }
    
    .store-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.92); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .store-modal-overlay.active { display: flex; }
    
    .checkout-modal-content { background: #000; border: 2px solid #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }
    
    .checkout-btn { cursor: pointer; padding: 12px; border: 2px solid #fff; border-radius: 8px; background: #ff0000; font-weight: 900; }
</style>
</head>
<body>

<div id="home-page" class="page-view active">
    <div class="link-map-container" id="container">
        <img src="web2026lore.jpg" alt="Antifaz Links" usemap="#antifaz-links" id="map-image">
        <map name="antifaz-links">
            <area shape="circle" coords="300,147,100" href="https://lamusicadelgarage.org/noticia/2416537/antifaz-y-el-grito-necesario-del-punk-latino-guillo-presenta-su-disco-debut-que-dolor" alt="Bio" data-tooltip="📖 Biografia ➔">
            <area shape="circle" coords="486,332,48" href="#store" alt="Merch" data-tooltip="👕 Merch Tienda ➔">
        </map>
        <div id="tooltip" class="custom-tooltip"></div>
    </div>
</div>

<div id="store-page" class="page-view">
    <div class="store-container">
        <div class="products-grid">
            <!-- Add your product-card divs here -->
        </div>
    </div>
    <div class="store-footer-content">
        <div class="cart-summary-box">
            <button onclick="openCheckoutModal()">CHECKOUT</button>
        </div>
    </div>
</div>

<div id="checkout-modal" class="store-modal-overlay" onclick="closeCheckoutModal()">
    <div class="checkout-modal-content" onclick="event.stopPropagation()">
        <p>Please copy and paste the order details:</p>
        <div id="checkout-summary-body"></div>
        <button onclick="closeCheckoutModal()">Cerrar</button>
    </div>
</div>

<script>
    // --- MAP & TOOLTIP LOGIC ---
    const tooltip = document.getElementById('tooltip');
    const container = document.getElementById('container');
    const areas = document.querySelectorAll('area');

    function showTooltip(area) {
        tooltip.textContent = area.getAttribute('data-tooltip');
        tooltip.classList.add('visible');
    }

    function hideTooltip() { tooltip.classList.remove('visible'); }

    areas.forEach(area => {
        area.addEventListener('mouseenter', () => showTooltip(area));
        area.addEventListener('mouseleave', hideTooltip);
        area.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            tooltip.style.left = `${e.clientX - rect.left}px`;
            tooltip.style.top = `${e.clientY - rect.top}px`;
        });
        area.addEventListener('click', (e) => {
            if (area.getAttribute('href') === '#store') { e.preventDefault(); navigateTo('store'); }
        });
    });

    // --- NAVIGATION ---
    function navigateTo(pageId) {
        document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId + '-page').classList.add('active');
        document.getElementById(pageId + '-page').style.display = 'flex';
    }

    // --- CHECKOUT MODAL LOGIC ---
    function openCheckoutModal() {
        const summaryBody = document.getElementById('checkout-summary-body');
        summaryBody.innerHTML = "Order details loading..."; 
        document.getElementById('checkout-modal').classList.add('active');
    }

    function closeCheckoutModal() {
        document.getElementById('checkout-modal').classList.remove('active');
    }

    function resizeMap() { /* Your existing map resize code */ }
    window.addEventListener('resize', resizeMap);
</script>
</body>
</html>
