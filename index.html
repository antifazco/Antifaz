<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>* ANTIFAZ 1 *</title>
<style>
    /* Sleek Custom Scrollbar */
    ::-webkit-scrollbar {
        width: 10px;
    }
    ::-webkit-scrollbar-track {
        background: #000;
    }
    ::-webkit-scrollbar-thumb {
        background: #ff0000;
        border: 2px solid #000;
        border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
        background: #b30000;
    }

    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start; /* Aligns to top to optimize vertical scrolling */
        min-height: 100vh;
        background-color: #000;
        font-family: Arial, sans-serif;
        padding-top: 20px;
        padding-bottom: 80px; 
        box-sizing: border-box;
    }

    .link-map-container {
        position: relative; 
        max-width: 1400px; /* Forces massive scale so users scroll downward */
        width: 95%; 
        overflow: visible; 
    }

    .link-map-container img {
        display: block;
        width: 100%;
        height: auto;
    }

    area {
        cursor: pointer;
    }

    /* Frantic Punk Pop & Shake Animation */
    @keyframes punkPop {
        0% {
            opacity: 0;
            transform: translate(-50%, -145%) scale(0.4) rotate(-8deg);
        }
        50% {
            transform: translate(-50%, -145%) scale(1.1) rotate(4deg);
        }
        75% {
            transform: translate(-50%, -145%) scale(0.95) rotate(-2deg);
        }
        100% {
            opacity: 1;
            transform: translate(-50%, -145%) scale(1) rotate(0deg);
        }
    }

    /* Comic Book Speech Bubble Tooltip */
    .custom-tooltip {
        position: absolute;
        background-color: #000;      
        color: #ff0000;             
        border: 2px solid #fff;     
        border-radius: 12px; /* Slightly reduced border radius for a classic boxy comic look */       
        padding: 8px 16px;
        font-size: 0.95rem; 
        font-weight: bold;
        letter-spacing: 1px;
        text-transform: uppercase;
        pointer-events: none;       
        opacity: 0;
        /* Re-centered slightly higher to account for the bubble tail height */
        transform: translate(-50%, -145%) scale(0.5);
        z-index: 2000;
        white-space: nowrap;
        box-shadow: 5px 5px 0px rgba(255, 0, 0, 0.3); /* Pop-art flat drop shadow */
    }

    /* The Speech Bubble Tail Outline (White Wrapper) */
    .custom-tooltip::before {
        content: "";
        position: absolute;
        bottom: -12px; /* Pulls triangle below border line */
        left: 50%;
        transform: translateX(-50%);
        border-width: 12px 10px 0; /* Creates sharp comic point triangle */
        border-style: solid;
        border-color: #fff transparent;
        display: block;
        width: 0;
    }

    /* The Speech Bubble Tail Fill (Black Inner Layer) */
    .custom-tooltip::after {
        content: "";
        position: absolute;
        bottom: -9px; 
        left: 50%;
        transform: translateX(-50%);
        border-width: 10px 8px 0;
        border-style: solid;
        border-color: #000 transparent;
        display: block;
        width: 0;
    }

    /* Triggers animation state on hover */
    .custom-tooltip.visible {
        opacity: 1;
        animation: punkPop 0.22s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
</style>
</head>
<body>

    <div class="link-map-container" id="container">
        <img src="web2026lore.jpg" alt="Antifaz Links" usemap="#antifaz-links" id="map-image">

        <map name="antifaz-links">
            <area shape="circle" coords="300,147,100" href="https://lamusicadelgarage.org/noticia/2416537/antifaz-y-el-grito-necesario-del-punk-latino-guillo-presenta-su-disco-debut-que-dolor" alt="Bio" data-tooltip="Biografia" target="_blank">

            <area shape="circle" coords="120,332,48" href="https://open.spotify.com/artist/6izznq82s4QurUpBqYthgt" alt="Spotify" data-tooltip="Spotify" target="_blank">
            <area shape="circle" coords="242,332,48" href="https://www.instagram.com/antifaz.co" alt="Instagram" data-tooltip="Instagram" target="_blank">
            <area shape="circle" coords="364,332,48" href="https://www.youtube.com/@Antifaz-co" alt="YouTube" data-tooltip="YouTube" target="_blank">
            <area shape="circle" coords="486,332,48" href="https://antifazco.bandcamp.com" alt="Merch" data-tooltip="Merch" target="_blank">

            <area shape="circle" coords="133,510,58" href="https://www.instagram.com/santty_cast/" alt="Trombone" data-tooltip="Santiago (Trombón)" target="_blank">
            <area shape="circle" coords="300,510,58" href="https://www.instagram.com/era_drummer/" alt="Drums" data-tooltip="Esteban (Batería)" target="_blank">
            <area shape="circle" coords="467,510,58" href="https://www.instagram.com/gavoespitia/" alt="Trumpet" data-tooltip="Gabriel (Trompeta)" target="_blank">

            <area shape="circle" coords="216,634,58" href="https://www.instagram.com/newbornlofi/" alt="Bass" data-tooltip="Boris (Bajo)" target="_blank">
            <area shape="circle" coords="384,634,58" href="https://www.instagram.com/guillo.moji/" alt="Guitar" data-tooltip="Guillo (Voz/Guitarra)" target="_blank">

            <area shape="rect" coords="20,735,580,795" href="https://www.reddit.com/user/GuilloMoji/comments/1qe1xps/desenmascarando_la_fiesta_de_m%C3%A1scaras_mojiganga/?utm_source=share&utm_medium=web3x&utm_name=web3xcss&utm_term=1&utm_content=share_button" alt="Info" data-tooltip="Informacion" target="_blank">

            <area shape="circle" coords="300,870,35" href="mailto:antifaz.co@gmail.com" alt="Contact" data-tooltip="Email: Antifaz.co@gmail.com">
        </map>

        <div id="tooltip" class="custom-tooltip"></div>
    </div>

    <script>
        const tooltip = document.getElementById('tooltip');
        const container = document.getElementById('container');
        const areas = document.querySelectorAll('area');

        areas.forEach(area => {
            area.addEventListener('mouseenter', () => {
                tooltip.textContent = area.getAttribute('data-tooltip');
                // Clears class and forces a layout reflow to restart the animation timeline fresh on every hover
                tooltip.classList.remove('visible');
                void tooltip.offsetWidth; 
                tooltip.classList.add('visible');
            });

            area.addEventListener('mousemove', (e) => {
                const rect = container.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                tooltip.style.left = `${x}px`;
                tooltip.style.top = `${y}px`;
            });

            area.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });
        });

        function resizeMap() {
            const img = document.getElementById('map-image');
            const map = document.getElementsByName('antifaz-links')[0];
            const mapAreas = map.getElementsByTagName('area');
            
            const originalWidth = 600; 
            const currentWidth = img.clientWidth;
            
            if (currentWidth === 0) return;

            const scale = currentWidth / originalWidth;

            const originalCoords = [
                [300,147,100], 
                [120,332,48],  
                [242,332,48],  
                [364,332,48],  
                [486,332,48],  
                [133,510,58],  
                [300,510,58],  
                [467,510,58],  
                [216,634,58],  
                [384,634,58],  
                [20,735,580,795], 
                [300,870,35]   
            ];

            for (let i = 0; i < mapAreas.length; i++) {
                const scaled = originalCoords[i].map(coord => Math.round(coord * scale));
                mapAreas[i].coords = scaled.join(',');
            }
        }

        window.addEventListener('resize', resizeMap);
        document.getElementById('map-image').addEventListener('load', resizeMap);
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(resizeMap, 300);
        });
    </script>

</body>
</html>
