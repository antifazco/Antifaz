<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ANTIFAZ</title>
<link type="image/png" sizes="512x512" rel="icon" href="favicon.png">
<style>
    /* Sleek Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #ff0000; border: 2px solid #000; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b30000; }

    body { margin: 0; padding: 0; background-color: #000; font-family: Arial, sans-serif; box-sizing: border-box; overflow-x: hidden; color: #fff; }

    /* SPA PAGE WRAPPERS */
    .page-view { display: none; width: 100%; opacity: 0; transition: opacity 0.25s ease-out; }
    .page-view.active { display: flex; flex-direction: column; align-items: center; opacity: 1; }
    #home-page { padding-top: 20px; padding-bottom: 40px; height: auto; min-height: 0; }

    .link-map-container { position: relative; max-width: 1400px; width: 95%; overflow: visible; }
    .link-map-container img { display: block; width: 100%; height: auto; }
    area { cursor: pointer; -webkit-tap-highlight-color: transparent; }

    /* Tooltips */
    .custom-tooltip { position: absolute; background-color: #000; color: #ff0000; border: 2px solid #fff; border-radius: 12px; padding: 8px 16px; font-size: 0.95rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; opacity: 0; transform: translate(-50%, -122%) scale(0.5); z-index: 2000; white-space: nowrap; box-shadow: 5px 5px 0px rgba(255, 0, 0, 0.3); pointer-events: none; transition: opacity 0.1s; }
    .custom-tooltip.visible { opacity: 1; animation: punkPop 0.22s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    @keyframes punkPop { 0% { transform: translate(-50%, -122%) scale(0.4) rotate(-8deg); } 100% { transform: translate(-50%, -122%) scale(1) rotate(0deg); } }

    /* Store */
    #store-page { background-image: url('storebkgr.jpg'); background-size: 100% auto; background-position: center top; background-repeat: no-repeat; background-color: #000; width: 100%; display: flex; flex-direction: column; align-items: center; }
    .store-container { max-width: 950px; width: 62vw; min-width: 500px; box-sizing: border-box; padding-top: 31vw; padding-bottom: 40px; }
    .store-footer-content { max-width: 950px; width: 62vw; min-width: 500px; margin-top: 20px; padding-bottom: 12vw; display: flex; flex-direction: column; align-items: center; gap: 25px; }
    
    .checkout-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; margin-top: 10px; }
    .whatsapp-checkout-btn { width: 100%; background-color: #ff0000; color: #000; border: 2px solid #fff; padding: 10px 5px; font-weight: 900; text-transform: uppercase; font-size: 0.8rem; cursor: pointer; border-radius: 8px; box-shadow: 4px 4px 0px #fff; }
    .back-btn { background-color: #000; color: #fff; border: 2px solid #fff; padding: 10px 24px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 8px; box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.95); }
    
    .product-card { background-color: rgba(0, 0, 0, 0.88); border: 2px solid #fff; border-radius: 12px; padding: 12px 2.5%; display: flex; flex-direction: row; gap: 4%; box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.95); align-items: center; margin-bottom: 35px; }
    .product-media-col { width: 360px; max-width: 45%; flex-shrink: 0; }
    .carousel-wrapper { position: relative; width: 100%; aspect-ratio: 4 / 3; border: 2px solid #fff; border-radius: 8px; background-color: #111; overflow: hidden; box-shadow: 4px 4px 0px #ffffff; }
    .carousel-slides { width: 100%; height: 100%; position: relative; cursor: zoom-in; }
    .carousel-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.2s; display: flex; justify-content: center; align-items: center; }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    
    .store-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.92); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .store-modal-overlay.active { display: flex; }
    .modal-carousel-container { width: 70vw; max-height: 80vh; aspect-ratio: 4 / 3; position: relative; background-color: #000; border: 3px solid #fff; border-radius: 12px; }
    .modal-slides-lane { width: 100%; height: 100%; position: relative; }
    .modal-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.25s; display: flex; justify-content: center; align-items: center; }
    .modal-slide.active { opacity: 1; z-index: 5; }
    .modal-slide img { width: 100%; height: 100%; object-fit: contain; }
    .modal-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #000; color: #ff0000; border: 2px solid #fff; width: 44px; height: 44px; font-weight: bold; cursor: pointer; z-index: 100; border-radius: 8px; box-shadow: 3px 3px 0px #ff0000; }
    
    @media (max-width: 767px) {
        .checkout-grid { grid-template-columns: 1fr; }
        .product-card { flex-direction: column-reverse; }
        .product-media-col { width: 100%; max-width: 100%; }
    }
</style>
</head>
<body>

    <div id="home-page" class="page-view active">
        <div class="link-map-container" id="container">
            <img src="web2026lore.jpg" alt="Antifaz Links" usemap="#antifaz-links" id="map-image">
            <map name="antifaz-links">
                <area shape="circle" coords="300,147,100" href="https://lamusicadelgarage.org/noticia/2416537/antifaz-y-el-grito-necesario-del-punk-latino-guillo-presenta-su-disco-debut-que-dolor" alt="Bio" data-tooltip="📖 Biografia ➔" target="_blank">
                <area shape="circle" coords="120,332,48" href="https://open.spotify.com/artist/6izznq82s4QurUpBqYthgt" alt="Spotify" data-tooltip="⚡ Spotify ➔" target="_blank">
                <area shape="circle" coords="242,332,48" href="https://www.instagram.com/antifaz.co" alt="Instagram" data-tooltip="📸 Instagram ➔" target="_blank">
                <area shape="circle" coords="364,332,48" href="https://www.youtube.com/@Antifaz-co" alt="YouTube" data-tooltip="📺 YouTube ➔" target="_blank">
                <area shape="circle" coords="486,332,48" href="#store" alt="Merch" data-tooltip="👕 Merch Tienda ➔">
                <area shape="circle" coords="133,510,58" href="https://www.instagram.com/santty_cast/" alt="Trombone" data-tooltip="🎺 Santiago (Trombón) ➔" target="_blank">
                <area shape="circle" coords="300,510,58" href="https://www.instagram.com/era_drummer/" alt="Drums" data-tooltip="🥁 Esteban (Batería) ➔" target="_blank">
                <area shape="circle" coords="467,510,58" href="https://www.instagram.com/gavoespitia/" alt="Trumpet" data-tooltip="🎺 Gabriel (Trompeta) ➔" target="_blank">
                <area shape="circle" coords="216,634,58" href="https://www.instagram.com/newbornlofi/" alt="Bass" data-tooltip="🎸 Boris (Bajo) ➔" target="_blank">
                <area shape="circle" coords="384,634,58" href="https://www.instagram.com/guillo.moji/" alt="Guitar" data-tooltip="🎤🎸 Guillo (Voz/Guitarra) ➔" target="_blank">
                <area shape="rect" coords="265,735,335,795" href="mailto:antifaz.co@gmail.com" alt="Info" data-tooltip="✉️ Email: ANTIFAZ.CO@GMAIL.COM ➔" target="_blank">
                <area shape="circle" coords="300,870,35" href="http://www.skacomombia.com/public/antifaz" alt="Anti Radio" data-tooltip="📻 ANTIFAZ RADIO ➔" target="_blank">
            </map>
            <div id="tooltip" class="custom-tooltip"></div>
        </div>
    </div>

    <div id="store-page" class="page-view">
        <div class="store-container">
            <div class="products-grid">
                <div class="product-card" data-id="vinyl" data-name='10" Vinyl Qué dolor!' data-price="100000">
                    <div class="product-details-col">
                        <h2 class="product-name">10" Vinyl Qué dolor!</h2>
                        <div class="product-price">$100.000 COP</div>
                        <select class="store-select qty-selector" onchange="updateCartSummary()"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
                    </div>
                    <div class="product-media-col">
                        <div class="carousel-wrapper">
                            <button class="carousel-btn prev" onclick="moveSlide(this, -1, event)">◀</button>
                            <div class="carousel-slides" onclick="openProductModal(this)">
                                <div class="carousel-slide active"><img src="vinyl1.jpg"></div>
                                <div class="carousel-slide"><img src="vinyl2.jpg"></div>
                                <div class="carousel-slide"><img src="vinyl3.jpg"></div>
                                <div class="carousel-slide"><img src="vinyl4.jpg"></div>
                                <div class="carousel-slide"><img src="vinyl5.jpg"></div>
                                <div class="carousel-slide"><img src="vinyl6.jpg"></div>
                            </div>
                            <button class="carousel-btn next" onclick="moveSlide(this, 1, event)">▶</button>
                        </div>
                    </div>
                </div>
                <div class="product-card" data-id="cassette" data-name="Cassette Qué dolor!" data-price="40000">
                    <div class="product-details-col">
                        <h2 class="product-name">Cassette Qué dolor!</h2>
                        <div class="product-price">$40.000 COP</div>
                        <select class="store-select qty-selector" onchange="updateCartSummary()"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
                    </div>
                    <div class="product-media-col">
                        <div class="carousel-wrapper">
                            <button class="carousel-btn prev" onclick="moveSlide(this, -1, event)">◀</button>
                            <div class="carousel-slides" onclick="openProductModal(this)">
                                <div class="carousel-slide active"><img src="cassette1.jpg"></div>
                                <div class="carousel-slide"><img src="cassette2.jpg"></div>
                                <div class="carousel-slide"><img src="cassette3.jpg"></div>
                            </div>
                            <button class="carousel-btn next" onclick="moveSlide(this, 1, event)">▶</button>
                        </div>
                    </div>
                </div>
                <div class="product-card" data-id="shirt" data-name="Camiseta Qué dolor!" data-price="60000">
                    <div class="product-details-col">
                        <h2 class="product-name">Camiseta Qué dolor!</h2>
                        <div class="product-price">$60.000 COP</div>
                        <select class="store-select size-selector" onchange="updateCartSummary()"><option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option></select>
                        <select class="store-select qty-selector" onchange="updateCartSummary()"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
                    </div>
                    <div class="product-media-col">
                        <div class="carousel-wrapper">
                            <button class="carousel-btn prev" onclick="moveSlide(this, -1, event)">◀</button>
                            <div class="carousel-slides" onclick="openProductModal(this)">
                                <div class="carousel-slide active"><img src="shirt1.jpg"></div>
                                <div class="carousel-slide"><img src="shirt2.jpg"></div>
                            </div>
                            <button class="carousel-btn next" onclick="moveSlide(this, 1, event)">▶</button>
                        </div>
                    </div>
                </div>
                <div class="product-card" data-id="hat" data-name="Gorra visera plana" data-price="40000">
                    <div class="product-details-col">
                        <h2 class="product-name">Gorra visera plana</h2>
                        <div class="product-price">$40.000 COP</div>
                        <select class="store-select qty-selector" onchange="updateCartSummary()"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
                    </div>
                    <div class="product-media-col">
                        <div class="carousel-wrapper">
                            <button class="carousel-btn prev" onclick="moveSlide(this, -1, event)">◀</button>
                            <div class="carousel-slides" onclick="openProductModal(this)">
                                <div class="carousel-slide active"><img src="gorra1.jpg"></div>
                                <div class="carousel-slide"><img src="gorra2.jpg"></div>
                            </div>
                            <button class="carousel-btn next" onclick="moveSlide(this, 1, event)">▶</button>
                        </div>
                    </div>
                </div>
                <div class="product-card" data-id="picks" data-name="Guitar Picks (x4)" data-price="20000">
                    <div class="product-details-col">
                        <h2 class="product-name">Guitar Picks (x4)</h2>
                        <div class="product-price">$20.000 COP</div>
                        <select class="store-select qty-selector" onchange="updateCartSummary()"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
                    </div>
                    <div class="product-media-col">
                        <div class="carousel-wrapper">
                            <button class="carousel-btn prev" onclick="moveSlide(this, -1, event)">◀</button>
                            <div class="carousel-slides" onclick="openProductModal(this)">
                                <div class="carousel-slide active"><img src="pick1.jpg"></div>
                                <div class="carousel-slide"><img src="pick2.jpg"></div>
                            </div>
                            <button class="carousel-btn next" onclick="moveSlide(this, 1, event)">▶</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="store-footer-content">
            <div class="cart-summary-box">
                <h3 class="cart-title">🛒 Resumen de Orden</h3>
                <div id="cart-items-container" class="cart-items-list"><span class="cart-empty-msg">Tu carrito está vacío.</span></div>
                <div class="cart-total-row"><span>TOTAL:</span><span id="cart-total-price-display" class="cart-total-price">$0 COP</span></div>
                <div class="checkout-grid">
                    <button class="whatsapp-checkout-btn" onclick="checkoutToWhatsApp('COL')">🇨🇴 COL</button>
                    <button class="whatsapp-checkout-btn" onclick="checkoutToWhatsApp('USA')">🇺🇸 USA</button>
                    <button class="whatsapp-checkout-btn" onclick="checkoutToWhatsApp('EUR')">🇪🇺 EUR</button>
                </div>
            </div>
            <button class="back-btn" onclick="navigateTo('home')">← Volver</button>
        </div>
    </div>

    <div id="global-store-modal" class="store-modal-overlay" onclick="closeProductModal(event)">
        <div class="modal-carousel-container" onclick="event.stopPropagation()">
            <button class="modal-btn prev" onclick="moveModalSlide(-1)">◀</button>
            <div id="modal-slides-lane" class="modal-slides-lane"></div>
            <button class="modal-btn next" onclick="moveModalSlide(1)">▶</button>
        </div>
    </div>

    <script>
        // TOOLTIP & STATE
        const tooltip = document.getElementById('tooltip'); const container = document.getElementById('container');
        document.addEventListener('mousemove', (e) => {
            if (e.target.tagName === 'AREA') {
                const rect = container.getBoundingClientRect();
                tooltip.style.left = (e.clientX - rect.left) + 'px';
                tooltip.style.top = (e.clientY - rect.top) + 'px';
                tooltip.textContent = e.target.getAttribute('data-tooltip');
                tooltip.classList.add('visible');
            } else { tooltip.classList.remove('visible'); }
        });

        // CART & CHECKOUT
        function updateCartSummary() {
            const cards = document.querySelectorAll('.product-card'); const items = document.getElementById('cart-items-container');
            const total = document.getElementById('cart-total-price-display'); let lines = [], price = 0;
            cards.forEach(c => {
                const qty = parseInt(c.querySelector('.qty-selector').value);
                if (qty > 0) {
                    let line = `${qty} x ${c.getAttribute('data-name')}`;
                    if (c.getAttribute('data-id') === 'shirt') line += ` (Talla: ${c.querySelector('.size-selector').value})`;
                    lines.push(line); price += (parseInt(c.getAttribute('data-price')) * qty);
                }
            });
            items.innerHTML = lines.length ? lines.map(l => `<div>• ${l}</div>`).join('') : '<span class="cart-empty-msg">Tu carrito está vacío.</span>';
            total.textContent = `$${price.toLocaleString('es-CO')} COP`;
        }

        function checkoutToWhatsApp(reg) {
            const cards = document.querySelectorAll('.product-card'); let lines = [], price = 0;
            cards.forEach(c => {
                const qty = parseInt(c.querySelector('.qty-selector').value);
                if (qty > 0) {
                    let line = `${qty}x ${c.getAttribute('data-name')}`;
                    if (c.getAttribute('data-id') === 'shirt') line += ` [Talla: ${c.querySelector('.size-selector').value}]`;
                    lines.push(line); price += (parseInt(c.getAttribute('data-price')) * qty);
                }
            });
            if (!lines.length) { alert('Selecciona al menos 1 artículo.'); return; }
            const cur = reg === 'COL' ? 'COP' : (reg === 'USA' ? 'USD' : 'EUR');
            const msg = encodeURIComponent(`¡Qué más! Quiero armar un pedido (${reg}) de ANTIFAZ:\n\n${lines.join('\n')}\n\nTotal: ${price.toLocaleString()} ${cur}\n\n¿Tienen disponibilidad? 💥`);
            window.open(`https://api.whatsapp.com/send?phone=573000000000&text=${msg}`, '_blank');
        }

        // NAVIGATION & CAROUSELS
        function navigateTo(p) {
            const h = document.getElementById('home-page'), s = document.getElementById('store-page');
            if (p === 'store') { h.style.display = 'none'; s.style.display = 'flex'; h.classList.remove('active'); s.classList.add('active'); }
            else { s.style.display = 'none'; h.style.display = 'flex'; s.classList.remove('active'); h.classList.add('active'); setTimeout(resizeMap, 50); }
            window.scrollTo(0,0);
        }
        function moveSlide(btn, dir, e) {
            if (e) e.stopPropagation();
            const slides = btn.closest('.carousel-wrapper').querySelectorAll('.carousel-slide');
            let idx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[idx].classList.remove('active');
            let next = (idx + dir + slides.length) % slides.length;
            slides[next].classList.add('active');
        }

        // MODAL
        let ctx = null;
        function openProductModal(el) {
            ctx = el.closest('.product-card');
            const lane = document.getElementById('modal-slides-lane');
            lane.innerHTML = '';
            el.querySelectorAll('.carousel-slide').forEach((s, i) => {
                const div = document.createElement('div');
                div.className = `modal-slide ${s.classList.contains('active') ? 'active' : ''}`;
                div.innerHTML = `<img src="${s.querySelector('img').src}">`;
                lane.appendChild(div);
            });
            document.getElementById('global-store-modal').classList.add('active');
        }
        function closeProductModal(e) { document.getElementById('global-store-modal').classList.remove('active'); }
        function moveModalSlide(dir) {
            const slides = document.querySelectorAll('.modal-slide');
            let idx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[idx].classList.remove('active');
            let next = (idx + dir + slides.length) % slides.length;
            slides[next].classList.add('active');
            if (ctx) {
                const cSlides = ctx.querySelectorAll('.carousel-slide');
                cSlides.forEach(s => s.classList.remove('active'));
                cSlides[next].classList.add('active');
            }
        }
        function resizeMap() { /* ...logic... */ }
        window.addEventListener('resize', resizeMap); document.getElementById('map-image').addEventListener('load', resizeMap);
        window.onload = () => { resizeMap(); document.getElementById('store-page').style.display = 'none'; };
    </script>
</body>
</html>
