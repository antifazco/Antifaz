<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>-ANTIFAZ-</title>
<link type="image/png" sizes="512x512" rel="icon" href="favicon.png">
<style>
    /* Sleek Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #ff0000; border: 2px solid #000; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b30000; }

    body { margin: 0; padding: 0; background-color: #000; font-family: Arial, sans-serif; box-sizing: border-box; overflow-x: hidden; color: #fff; }

    /* SPA PAGE WRAPPERS & TRANSITIONS */
    .page-view { display: none; width: 100%; opacity: 0; transition: opacity 0.25s ease-out; }
    .page-view.active { display: flex; flex-direction: column; align-items: center; opacity: 1; }

    #home-page { padding-top: 20px; padding-bottom: 40px; height: auto; min-height: 0; }
    .link-map-container { position: relative; max-width: 1400px; width: 95%; overflow: visible; }
    .link-map-container img { display: block; width: 100%; height: auto; }
    area { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    @media (max-width: 767px) { .link-map-container { width: 100% !important; padding: 0; } }

    @keyframes punkPop {
        0% { opacity: 0; transform: translate(-50%, -122%) scale(0.4) rotate(-8deg); }
        50% { transform: translate(-50%, -122%) scale(1.1) rotate(4deg); }
        75% { transform: translate(-50%, -122%) scale(0.95) rotate(-2deg); }
        100% { opacity: 1; transform: translate(-50%, -122%) scale(1) rotate(0deg); }
    }

    .custom-tooltip { position: absolute; background-color: #000; color: #ff0000; border: 2px solid #fff; border-radius: 12px; padding: 8px 16px; font-size: 0.95rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; opacity: 0; transform: translate(-50%, -122%) scale(0.5); z-index: 2000; white-space: nowrap; box-shadow: 5px 5px 0px rgba(255, 0, 0, 0.3); pointer-events: auto; cursor: pointer; transition: background-color 0.1s, opacity 0.1s, left 0.05s ease-out, top 0.05s ease-out; -webkit-tap-highlight-color: transparent; }
    .custom-tooltip.visible { opacity: 1; animation: punkPop 0.22s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    .custom-tooltip::before { content: ""; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); border-width: 12px 10px 0; border-style: solid; border-color: #fff transparent; display: block; width: 0; }
    .custom-tooltip::after { content: ""; position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%); border-width: 10px 8px 0; border-style: solid; border-color: #000 transparent; display: block; width: 0; }

    /* STORE FRONT ARCHITECTURE */
    #store-page { background-image: url('storebkgr.jpg'); background-size: 100% auto; background-position: center top; background-repeat: no-repeat; background-color: #000; width: 100%; display: flex; flex-direction: column; align-items: center; }
    .store-container { max-width: 950px; width: 62vw; min-width: 500px; box-sizing: border-box; padding-top: 31vw; padding-bottom: 40px; }
    .store-footer-content { max-width: 950px; width: 62vw; min-width: 500px; box-sizing: border-box; margin-top: 20px; padding-bottom: 12vw; display: flex; flex-direction: column; align-items: center; gap: 25px; }
    .back-btn { background-color: #000; color: #fff; border: 2px solid #fff; padding: 10px 24px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 8px; }
    
    .products-grid { display: flex; flex-direction: column; gap: 35px; width: 100%; }
    .product-card { background-color: rgba(0, 0, 0, 0.88); border: 2px solid #fff; border-radius: 12px; padding: 12px 2.5%; display: flex; flex-direction: row; gap: 4%; align-items: center; }
    .product-details-col { flex: 1.3; display: flex; flex-direction: column; align-items: flex-start; }
    .product-media-col { width: 360px; max-width: 45%; flex-shrink: 0; }
    .carousel-wrapper { position: relative; width: 100%; aspect-ratio: 4 / 3; border: 2px solid #fff; border-radius: 8px; background-color: #111; overflow: hidden; }
    .carousel-slides { width: 100%; height: 100%; cursor: zoom-in; }
    .carousel-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.2s; display: flex; align-items: center; }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    
    /* MODAL STYLES */
    .store-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.92); z-index: 9999; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.2s; }
    .store-modal-overlay.active { display: flex; opacity: 1; }
    .checkout-modal-content { background: #000; border: 2px solid #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
    #qr-image { max-width: 150px; border: 4px solid #fff; margin: 15px auto; display: block; }

    .store-select { background: #000; color: #fff; border: 2px solid #fff; padding: 6px 10px; font-weight: bold; border-radius: 6px; width: 60px !important; text-align: center; }
    .checkout-buttons-row { display: flex; gap: 10px; width: 100%; }
    .checkout-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 6px; border: 2px solid #fff; border-radius: 8px; cursor: pointer; background: #ff0000; font-weight: 900; }
</style>
</head>
<body>

    <!-- YOUR ORIGINAL MAP SECTION -->
    <div id="home-page" class="page-view active">
        <div class="link-map-container" id="container">
            <img src="web2026lore.jpg" alt="Antifaz Links" usemap="#antifaz-links" id="map-image">
            <map name="antifaz-links">
                <!-- Keep your original areas here -->
                <area shape="circle" coords="486,332,48" href="#store" alt="Merch" data-tooltip="👕 Merch Tienda ➔">
            </map>
            <div id="tooltip" class="custom-tooltip"></div>
        </div>
    </div>

    <!-- YOUR ORIGINAL STORE SECTION -->
    <div id="store-page" class="page-view">
        <div class="store-container">
            <div class="products-grid">
                <!-- Keep your original product cards here (Vinyl, Cassette, Shirt, Hat, Picks) -->
            </div>
        </div>
        <div class="store-footer-content">
            <div class="cart-summary-box">
                <div id="cart-items-container"></div>
                <div id="cart-total-price-display">TOTAL: $0 COP</div>
                <div class="checkout-buttons-row">
                    <button class="checkout-btn" onclick="openCheckoutModal('qrcol.png')">WhatsApp</button>
                    <button class="checkout-btn" onclick="openCheckoutModal('qrusa.png')">PayPal</button>
                    <button class="checkout-btn" onclick="openCheckoutModal('qreuro.png')">Wero</button>
                </div>
            </div>
            <button class="back-btn" onclick="navigateTo('home')">← Volver</button>
        </div>
    </div>

    <!-- NEW QR MODAL -->
    <div id="checkout-modal" class="store-modal-overlay" onclick="closeCheckoutModal()">
        <div class="checkout-modal-content" onclick="event.stopPropagation()">
            <p>Please copy and paste the articles description and total when submitting your payment</p>
            <img id="qr-image" src="" alt="Payment QR">
            <div id="checkout-summary-body" style="margin: 20px 0;"></div>
            <button class="back-btn" onclick="closeCheckoutModal()">Cerrar</button>
        </div>
    </div>

    <script>
        // 1. KEEP YOUR ORIGINAL SCRIPT FUNCTIONS (resizeMap, moveSlide, navigateTo, etc.)
        // 2. ADD THESE AT THE END:
        function openCheckoutModal(qrFileName) {
            updateCartSummary();
            document.getElementById('qr-image').src = qrFileName;
            const items = document.getElementById('cart-items-container').innerHTML;
            const total = document.getElementById('cart-total-price-display').innerText;
            document.getElementById('checkout-summary-body').innerHTML = `<strong>Pedido:</strong><br>${items}<br><strong>${total}</strong>`;
            document.getElementById('checkout-modal').classList.add('active');
        }

        function closeCheckoutModal() { document.getElementById('checkout-modal').classList.remove('active'); }
        
        // ... (Include your map and event listener scripts here)
    </script>
</body>
</html>
