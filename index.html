<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>-ANTIFAZ-</title>
<link type="image/png" sizes="512x512" rel="icon" href="favicon.png">
<style>
    /* Sleek Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #ff0000; border: 2px solid #000; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b30000; }

    body { margin: 0; padding: 0; background-color: #000; font-family: Arial, sans-serif; box-sizing: border-box; overflow-x: hidden; color: #fff; }

    /* SPA PAGE WRAPPERS & TRANSITIONS */
    .page-view { display: none; width: 100%; opacity: 0; transition: opacity 0.25s ease-out; }
    .page-view.active { display: flex; flex-direction: column; align-items: center; opacity: 1; }
    #home-page { padding-top: 20px; padding-bottom: 40px; }

    .link-map-container { position: relative; max-width: 1400px; width: 95%; overflow: visible; }
    .link-map-container img { display: block; width: 100%; height: auto; }
    area { cursor: pointer; -webkit-tap-highlight-color: transparent; }

    /* Comic Book Speech Bubble Tooltip */
    .custom-tooltip {
        position: absolute; background-color: #000; color: #ff0000; border: 2px solid #fff; border-radius: 12px; padding: 8px 16px;
        font-size: 0.95rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; opacity: 0;
        transform: translate(-50%, -122%) scale(0.5); z-index: 2000; white-space: nowrap;
        box-shadow: 5px 5px 0px rgba(255, 0, 0, 0.3); pointer-events: none; transition: opacity 0.1s;
    }
    .custom-tooltip.visible { opacity: 1; animation: punkPop 0.22s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    @keyframes punkPop { 0% { transform: translate(-50%, -122%) scale(0.4) rotate(-8deg); } 100% { transform: translate(-50%, -122%) scale(1) rotate(0deg); } }

    /* STORE PAGE */
    #store-page { background-image: url('storebkgr.jpg'); background-size: 100% auto; background-position: center top; background-repeat: no-repeat; background-color: #000; width: 100%; display: flex; flex-direction: column; align-items: center; }
    .store-container { max-width: 950px; width: 62vw; min-width: 500px; padding-top: 31vw; padding-bottom: 40px; }
    .store-footer-content { max-width: 950px; width: 62vw; min-width: 500px; margin-top: 20px; padding-bottom: 12vw; display: flex; flex-direction: column; align-items: center; gap: 25px; }
    
    .product-card { background-color: rgba(0, 0, 0, 0.88); border: 2px solid #fff; border-radius: 12px; padding: 12px 2.5%; display: flex; flex-direction: row; gap: 4%; box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.95); align-items: center; margin-bottom: 35px; }
    .product-media-col { width: 360px; max-width: 45%; flex-shrink: 0; }
    
    .carousel-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; border: 2px solid #fff; border-radius: 8px; background-color: #111; overflow: hidden; box-shadow: 4px 4px 0px #ffffff; }
    .carousel-slides { width: 100%; height: 100%; position: relative; cursor: zoom-in; }
    .carousel-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.2s; display: flex; justify-content: center; align-items: center; }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    
    /* MODAL */
    .store-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.92); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .store-modal-overlay.active { display: flex; }
    .modal-carousel-container { width: 70vw; max-height: 80vh; aspect-ratio: 4/3; position: relative; background-color: #000; border: 3px solid #fff; border-radius: 12px; }
    .modal-slides-lane { width: 100%; height: 100%; position: relative; }
    .modal-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.25s; display: flex; justify-content: center; align-items: center; }
    .modal-slide.active { opacity: 1; z-index: 5; }
    .modal-slide img { width: 100%; height: 100%; object-fit: contain; }
    .modal-btn { position: absolute; top: 50%; transform: translateY(-50%); background: #000; color: #ff0000; border: 2px solid #fff; width: 44px; height: 44px; font-weight: bold; cursor: pointer; z-index: 100; border-radius: 8px; box-shadow: 3px 3px 0px #ff0000; }
</style>
</head>
<body>

    <div id="home-page" class="page-view active">
        <div class="link-map-container" id="container">
            <img src="web2026lore.jpg" alt="Antifaz Links" usemap="#antifaz-links" id="map-image">
            <map name="antifaz-links">
                </map>
            <div id="tooltip" class="custom-tooltip"></div>
        </div>
    </div>

    <script>
        // TOOLTIP LOGIC (Restored explicitly)
        const tooltip = document.getElementById('tooltip');
        const container = document.getElementById('container');
        const areas = document.querySelectorAll('area');

        areas.forEach(area => {
            area.addEventListener('mouseenter', () => {
                tooltip.textContent = area.getAttribute('data-tooltip');
                tooltip.classList.add('visible');
            });
            area.addEventListener('mousemove', (e) => {
                const rect = container.getBoundingClientRect();
                tooltip.style.left = (e.clientX - rect.left) + 'px';
                tooltip.style.top = (e.clientY - rect.top) + 'px';
            });
            area.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
            });
        });

        // NAVIGATION LOGIC (Full functions restored)
        function navigateTo(p) {
            const h = document.getElementById('home-page');
            const s = document.getElementById('store-page');
            if(p === 'store') {
                h.classList.remove('active'); h.style.display = 'none';
                s.style.display = 'flex'; s.classList.add('active');
            } else {
                s.classList.remove('active'); s.style.display = 'none';
                h.style.display = 'flex'; h.classList.add('active');
                resizeMap();
            }
            window.scrollTo(0,0);
        }

        // CAROUSEL & MODAL LOGIC (Full functions restored)
        function moveSlide(btn, dir, e) {
            if(e) e.stopPropagation();
            const wrapper = btn.closest('.carousel-wrapper');
            const slides = wrapper.querySelectorAll('.carousel-slide');
            let idx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[idx].classList.remove('active');
            let next = (idx + dir + slides.length) % slides.length;
            slides[next].classList.add('active');
        }

        let ctx = null;
        function openProductModal(el) {
            ctx = el.closest('.product-card');
            const lane = document.getElementById('modal-slides-lane');
            lane.innerHTML = '';
            el.querySelectorAll('.carousel-slide').forEach(s => {
                const d = document.createElement('div');
                d.className = `modal-slide ${s.classList.contains('active') ? 'active' : ''}`;
                d.innerHTML = `<img src="${s.querySelector('img').src}">`;
                lane.appendChild(d);
            });
            document.getElementById('global-store-modal').classList.add('active');
        }

        function closeProductModal() { document.getElementById('global-store-modal').classList.remove('active'); }

        function moveModalSlide(dir) {
            const slides = document.querySelectorAll('.modal-slide');
            let i = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[i].classList.remove('active');
            let next = (i + dir + slides.length) % slides.length;
            slides[next].classList.add('active');
            if(ctx) {
                const cSlides = ctx.querySelectorAll('.carousel-slide');
                cSlides.forEach(s => s.classList.remove('active'));
                cSlides[next].classList.add('active');
            }
        }
        
        // ... (Keep existing updateCartSummary, checkoutToWhatsApp, and resizeMap functions here) ...
        
        window.onload = () => { resizeMap(); };
    </script>
</body>
</html>
